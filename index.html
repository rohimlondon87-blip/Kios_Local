<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir & Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #f3f4f6; padding-bottom: 80px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Loader Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #059669; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- Global Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white bg-opacity-90 z-[100] flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-gray-600 font-medium" id="loadingText">Memuat Data...</p>
    </div>

    <!-- Header -->
    <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
        <h1 class="text-xl font-bold" id="headerTitle"><i class="fas fa-store mr-2"></i> Toko Saya</h1>
        <div class="flex space-x-4">
            <button onclick="switchView('kasir')" id="btnNavKasir" class="hidden text-white font-bold"><i class="fas fa-cash-register mr-1"></i> Kasir</button>
            <button onclick="switchView('admin')" id="btnNavAdmin" class="text-emerald-200 hover:text-white"><i class="fas fa-user-shield mr-1"></i> Admin</button>
            <button onclick="toggleSettings()" class="text-white hover:text-emerald-200"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <!-- Modal Pengaturan -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6 fade-in">
            <h2 class="text-xl font-bold mb-4">Pengaturan URL Database</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">URL Google Apps Script</label>
                <input type="text" id="scriptUrlInput" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="toggleSettings()" class="px-4 py-2 text-gray-600 bg-gray-200 rounded-lg font-medium">Batal</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg font-medium">Simpan & Reload</button>
            </div>
        </div>
    </div>

    <!-- ================= VIEW KASIR ================= -->
    <div id="kasirView">
        <main class="p-4 grid grid-cols-2 gap-4" id="productList">
            <!-- Produk dirender di sini -->
        </main>

        <!-- Cart Bottom Bar -->
        <div id="cartBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] p-4 flex justify-between items-center z-30 translate-y-full transition-transform">
            <div>
                <p class="text-xs text-gray-500 font-medium">Total Pesanan</p>
                <p class="text-lg font-bold text-emerald-600" id="cartTotalMain">Rp 0</p>
            </div>
            <button onclick="toggleCartModal()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold flex items-center shadow-lg active:scale-95 transition-transform">
                <i class="fas fa-shopping-cart mr-2"></i> Lanjut (<span id="cartCount">0</span>)
            </button>
        </div>

        <!-- Modal Keranjang -->
        <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end justify-center fade-in">
            <div class="bg-white w-full rounded-t-2xl max-h-[80vh] flex flex-col">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                    <h2 class="text-lg font-bold">Detail Pesanan</h2>
                    <button onclick="toggleCartModal()" class="text-gray-500 text-xl p-2"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-4 overflow-y-auto flex-1" id="cartItemsList"></div>
                <div class="p-4 border-t bg-gray-50">
                    <div class="flex justify-between font-bold text-lg mb-4">
                        <span>Total</span>
                        <span class="text-emerald-600" id="cartTotalModal">Rp 0</span>
                    </div>
                    <button onclick="prosesCheckout()" id="btnCheckout" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-lg shadow-md active:bg-emerald-700">
                        Bayar & Simpan ke Sheet
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= VIEW ADMIN ================= -->
    <div id="adminView" class="hidden fade-in">
        <div class="p-4">
            <!-- Form Tambah Produk -->
            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-emerald-700"><i class="fas fa-plus-circle mr-2"></i>Tambah Produk Baru</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Nama Produk</label>
                        <input type="text" id="addName" placeholder="Cth: Nasi Padang" class="w-full border-b border-gray-300 py-2 focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Harga (Rp)</label>
                        <input type="number" id="addPrice" placeholder="Cth: 20000" class="w-full border-b border-gray-300 py-2 focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">URL Gambar (Opsional)</label>
                        <input type="text" id="addImage" placeholder="https://..." class="w-full border-b border-gray-300 py-2 focus:border-emerald-500 outline-none text-sm text-gray-500">
                    </div>
                    <button onclick="tambahProduk()" id="btnAddProduct" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold mt-2 active:bg-emerald-700">
                        Simpan Produk
                    </button>
                </div>
            </div>

            <!-- Daftar Produk Admin -->
            <h2 class="text-lg font-bold mb-3 text-gray-800">Daftar Produk Saat Ini</h2>
            <div id="adminProductList" class="space-y-3">
                <!-- Produk Admin dirender di sini -->
            </div>
        </div>
    </div>

    <script>
        // DEFAULT URL (Ganti dengan URL baru setelah Deploy GAS yang baru)
        const DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbw06Y1yx15c1U7v5WgxsSu96N8LQ-BcSZb7gRg1ZLkPVWtB0IPU-gRGUcXJDVzXUuz9/exec';
        
        let products = [];
        let cart = [];
        let currentView = 'kasir';

        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        
        function getGasUrl() {
            return localStorage.getItem('gas_url') || DEFAULT_URL;
        }

        // ================= CORE FUNCTIONS =================
        
        async function fetchProducts() {
            showLoading("Mengambil data produk...");
            try {
                const response = await fetch(getGasUrl() + '?action=getProducts');
                const data = await response.json();
                products = data;
                renderProducts();
                renderAdminProducts();
                hideLoading();
            } catch (error) {
                hideLoading();
                alert("Gagal memuat produk. Pastikan URL Google Script benar dan internet aktif.");
            }
        }

        async function postData(payload, loadingMsg) {
            showLoading(loadingMsg);
            try {
                // Menggunakan text/plain untuk menghindari CORS Preflight error di GAS
                const response = await fetch(getGasUrl(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                hideLoading();
                return result;
            } catch (error) {
                hideLoading();
                alert("Terjadi kesalahan jaringan.");
                return null;
            }
        }

        // ================= KASIR FUNCTIONS =================

        function renderProducts() {
            const list = document.getElementById('productList');
            list.innerHTML = '';
            
            if (products.length === 0) {
                list.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-10">Belum ada produk. Masuk ke menu Admin untuk menambah produk.</div>`;
                return;
            }

            products.forEach(p => {
                const imgUrl = p.image || 'https://via.placeholder.com/150?text=No+Image';
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm overflow-hidden flex flex-col active:scale-95 transition-transform cursor-pointer";
                card.onclick = () => addToCart(p);
                card.innerHTML = `
                    <img src="${imgUrl}" alt="${p.name}" class="w-full h-32 object-cover" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                    <div class="p-3 flex flex-col flex-1 justify-between">
                        <h3 class="text-sm font-bold text-gray-800 leading-tight mb-1">${p.name}</h3>
                        <p class="text-emerald-600 font-bold text-sm">${formatRp(p.price)}</p>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) existing.qty += 1;
            else cart.push({ ...product, qty: 1 });
            updateCartUI();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCartUI();
            }
        }

        function updateCartUI() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('cartTotalMain').innerText = formatRp(totalPrice);
            document.getElementById('cartTotalModal').innerText = formatRp(totalPrice);

            const cartBar = document.getElementById('cartBar');
            if (totalQty > 0 && currentView === 'kasir') {
                cartBar.classList.remove('translate-y-full');
            } else {
                cartBar.classList.add('translate-y-full');
                document.getElementById('cartModal').classList.add('hidden');
            }

            const cartList = document.getElementById('cartItemsList');
            cartList.innerHTML = '';
            if(cart.length === 0) return;

            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center py-3 border-b border-gray-100";
                div.innerHTML = `
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">${item.name}</h4>
                        <p class="text-emerald-600 text-sm font-medium">${formatRp(item.price)}</p>
                    </div>
                    <div class="flex items-center space-x-3 bg-gray-100 rounded-lg p-1">
                        <button onclick="changeQty('${item.id}', -1)" class="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-red-500 font-bold">-</button>
                        <span class="font-bold w-4 text-center text-sm">${item.qty}</span>
                        <button onclick="changeQty('${item.id}', 1)" class="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-emerald-600 font-bold">+</button>
                    </div>
                `;
                cartList.appendChild(div);
            });
        }

        function toggleCartModal() {
            if (cart.length > 0) document.getElementById('cartModal').classList.toggle('hidden');
        }

        async function prosesCheckout() {
            if(cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const itemsSummary = cart.map(item => `${item.name} (x${item.qty})`).join(', ');

            const payload = {
                action: 'checkout',
                orderId: "ORD-" + new Date().getTime(),
                items: itemsSummary,
                total: total
            };

            const res = await postData(payload, "Menyimpan Transaksi...");
            if(res && res.status === 'success') {
                alert("Transaksi Berhasil Disimpan!");
                cart = [];
                updateCartUI();
                toggleCartModal();
            }
        }

        // ================= ADMIN FUNCTIONS =================

        function renderAdminProducts() {
            const list = document.getElementById('adminProductList');
            list.innerHTML = '';
            
            if (products.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-500 text-center">Belum ada produk terdaftar.</p>`;
                return;
            }

            products.forEach(p => {
                const imgUrl = p.image || 'https://via.placeholder.com/50?text=Img';
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-center justify-between";
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <img src="${imgUrl}" class="w-12 h-12 object-cover rounded-md bg-gray-100" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <h4 class="font-bold text-sm text-gray-800">${p.name}</h4>
                            <p class="text-emerald-600 text-xs font-bold">${formatRp(p.price)}</p>
                        </div>
                    </div>
                    <button onclick="hapusProduk('${p.id}')" class="w-8 h-8 bg-red-100 text-red-500 rounded-full flex items-center justify-center active:bg-red-200">
                        <i class="fas fa-trash text-sm"></i>
                    </button>
                `;
                list.appendChild(div);
            });
        }

        async function tambahProduk() {
            const name = document.getElementById('addName').value;
            const price = document.getElementById('addPrice').value;
            const image = document.getElementById('addImage').value;

            if(!name || !price) {
                alert("Nama dan Harga produk wajib diisi!");
                return;
            }

            const payload = {
                action: 'add_product',
                name: name,
                price: parseInt(price),
                image: image
            };

            const res = await postData(payload, "Menyimpan Produk...");
            if(res && res.status === 'success') {
                document.getElementById('addName').value = '';
                document.getElementById('addPrice').value = '';
                document.getElementById('addImage').value = '';
                await fetchProducts(); // Reload data
                alert("Produk berhasil ditambahkan!");
            }
        }

        async function hapusProduk(id) {
            if(!confirm("Yakin ingin menghapus produk ini?")) return;
            
            const payload = { action: 'delete_product', id: id };
            const res = await postData(payload, "Menghapus Produk...");
            
            if(res && res.status === 'success') {
                await fetchProducts(); // Reload data
            }
        }

        // ================= UTILITIES =================

        function switchView(view) {
            currentView = view;
            const kasirV = document.getElementById('kasirView');
            const adminV = document.getElementById('adminView');
            const btnKasir = document.getElementById('btnNavKasir');
            const btnAdmin = document.getElementById('btnNavAdmin');
            const title = document.getElementById('headerTitle');

            if (view === 'kasir') {
                kasirV.classList.remove('hidden');
                adminV.classList.add('hidden');
                btnKasir.classList.add('hidden');
                btnAdmin.classList.remove('hidden');
                title.innerHTML = '<i class="fas fa-store mr-2"></i> Toko Saya';
                updateCartUI(); // Restore cart bar if needed
            } else {
                kasirV.classList.add('hidden');
                adminV.classList.remove('hidden');
                btnAdmin.classList.add('hidden');
                btnKasir.classList.remove('hidden');
                title.innerHTML = '<i class="fas fa-user-shield mr-2"></i> Panel Admin';
                document.getElementById('cartBar').classList.add('translate-y-full'); // Hide cart bar
            }
        }

        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                document.getElementById('scriptUrlInput').value = getGasUrl();
            }
        }

        function saveSettings() {
            const url = document.getElementById('scriptUrlInput').value;
            localStorage.setItem('gas_url', url);
            toggleSettings();
            fetchProducts();
        }

        window.onload = () => {
            fetchProducts();
        };
    </script>
</body>
</html>
